name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Build, Validate, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build reviewer index
        run: npm run index:build

      - name: Structural validation
        run: npm run validate

      - name: Markdown lint
        run: npm run lint

      - name: Tests
        run: npm test
