fsm:
  id: code-reviewer
  version: 1
  entry: scan_project

  # 14 states total: 11 happy-path (matching code-reviewer.md Steps 1-11)
  # plus 3 edge-case states (short_circuit_exit, stage_a_empty, terminal).
  #
  # Worker-driven states have a `worker:` block declaring role,
  # prompt template, inputs, and JSON-Schema response contract.
  # Inline states omit `worker:` — the FSM Orchestrator computes
  # the outputs deterministically from prior-state outputs.

  states:
    # ─── Step 1 ─────────────────────────────────────────────────
    - id: scan_project
      purpose: "Build a Project Profile from manifests + repo state."
      preconditions: []
      worker:
        role: project-scanner
        prompt_template: workers/project-scanner.md
        inputs:
          - args
        response_schema:
          type: object
          required: [project_profile, changed_paths, diff_stats]
          properties:
            project_profile:
              type: object
              required: [languages, frameworks, monorepo]
              properties:
                languages:
                  type: array
                  minItems: 1
                  items: { type: string }
                frameworks:
                  type: array
                  items: { type: string }
                monorepo: { type: boolean }
                ci: { type: array, items: { type: string } }
                container: { type: array, items: { type: string } }
                iac: { type: array, items: { type: string } }
                build: { type: array, items: { type: string } }
                lint: { type: array, items: { type: string } }
            changed_paths:
              type: array
              items: { type: string }
            diff_stats:
              type: object
              required: [lines_changed, files_changed]
              properties:
                lines_changed: { type: integer, minimum: 0 }
                files_changed: { type: integer, minimum: 0 }
      outputs:
        - project_profile
        - changed_paths
        - diff_stats
      post_validations:
        - "project_profile.languages is a non-empty list"
        - "diff_stats.lines_changed is a non-negative integer"
      transitions:
        - to: risk_tier_triage
          when: always

    # ─── Step 2 ─────────────────────────────────────────────────
    - id: risk_tier_triage
      purpose: "Bucket the diff into trivial/lite/full/sensitive and set the specialist cap."
      preconditions:
        - "project_profile exists in run state"
        - "changed_paths exists in run state"
        - "diff_stats exists in run state"
      # Inline state: no worker. The FSM Orchestrator applies the
      # tier rules from code-reviewer.md Step 2 deterministically.
      #
      # `scope_overrides_present` is a derived boolean: true iff any of
      # the orchestrator's args restrict scope (scope-dir / scope-lang /
      # scope-framework / scope-reviewer / scope-severity / scope-gate).
      # Computing it as an explicit output keeps the transition predicate
      # readable (predicate identifiers must be snake_case; args from
      # report-format.md are kebab-case).
      outputs:
        - tier
        - cap
        - tier_rationale
        - risk_signals
        - scope_overrides_present
      post_validations:
        - "tier is one of {trivial, lite, full, sensitive}"
        - "cap is an integer in [3, 50]"
      transitions:
        - to: short_circuit_exit
          when:
            kind: deterministic
            expression: "tier == 'trivial' AND len(risk_signals) == 0 AND NOT scope_overrides_present"
        - to: tree_descend
          when: always

    # ─── Step 3 ─────────────────────────────────────────────────
    - id: tree_descend
      purpose: "Walk reviewers.wiki by focus + activation gate; gather candidate leaves."
      preconditions:
        - "project_profile exists in run state"
        - "tier exists in run state"
      worker:
        role: tree-descender
        prompt_template: workers/tree-descender.md
        inputs:
          - project_profile
          - changed_paths
          - tier
        response_schema:
          type: object
          required: [stage_a_candidates, descent_path]
          properties:
            stage_a_candidates:
              type: array
              items:
                type: object
                required: [id, path, activation_match]
                properties:
                  id:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                  path: { type: string }
                  activation_match:
                    type: array
                    minItems: 1
                    items:
                      enum: [file_globs, keyword_matches, structural_signals, escalation_from, focus_only]
            descent_path:
              type: array
              items: { type: string }
      outputs:
        - stage_a_candidates
        - descent_path
      post_validations:
        - "stage_a_candidates is an array"
      transitions:
        - to: stage_a_empty
          when:
            kind: deterministic
            expression: "len(stage_a_candidates) == 0"
        - to: llm_trim
          when: always

    # ─── Step 4 ─────────────────────────────────────────────────
    - id: llm_trim
      purpose: "Pick K = cap leaves from candidates with one-sentence justifications per pick."
      preconditions:
        - "stage_a_candidates is non-empty"
        - "cap exists in run state"
      worker:
        role: trim-candidates
        prompt_template: workers/trim-candidates.md
        inputs:
          - project_profile
          - changed_paths
          - tier
          - cap
          - stage_a_candidates
        response_schema:
          type: object
          required: [picked_leaves, rejected_leaves, coverage_rescues]
          properties:
            picked_leaves:
              type: array
              items:
                type: object
                required: [id, path, justification, dimensions]
                properties:
                  id: { type: string }
                  path: { type: string }
                  justification: { type: string, minLength: 1 }
                  dimensions:
                    type: array
                    items: { type: string }
            rejected_leaves:
              type: array
              items:
                type: object
                required: [id, reason]
                properties:
                  id: { type: string }
                  reason: { type: string, minLength: 1 }
            coverage_rescues:
              type: array
              items:
                type: object
                required: [file, rescued_leaf, reason]
                properties:
                  file: { type: string }
                  rescued_leaf: { type: string }
                  reason: { type: string }
      outputs:
        - picked_leaves
        - rejected_leaves
        - coverage_rescues
      post_validations:
        - "picked_leaves is an array"
      transitions:
        - to: tool_discovery
          when: always

    # ─── Step 5 ─────────────────────────────────────────────────
    - id: tool_discovery
      purpose: "Collect external tools declared by picked leaves; run available ones."
      preconditions:
        - "picked_leaves is an array"
      worker:
        role: tool-runner
        prompt_template: workers/tool-runner.md
        inputs:
          - picked_leaves
          - args
        response_schema:
          type: object
          required: [tool_results]
          properties:
            tool_results:
              type: array
              items:
                oneOf:
                  - type: object
                    required: [name, status, findings, output]
                    properties:
                      name: { type: string }
                      status: { enum: [pass] }
                      findings: { type: integer }
                      output: { type: string }
                      reason: { type: string }
                      scoped_files:
                        type: array
                        items: { type: string }
                  - type: object
                    required: [name, status, findings, output]
                    properties:
                      name: { type: string }
                      status: { enum: [fail] }
                      findings: { type: integer }
                      output: { type: string }
                      reason: { type: string }
                      scoped_files:
                        type: array
                        items: { type: string }
                  - type: object
                    required: [name, status, reason]
                    properties:
                      name: { type: string }
                      status: { enum: [skipped] }
                      findings: { type: integer }
                      output: { type: string }
                      reason: { type: string }
                      scoped_files:
                        type: array
                        items: { type: string }
      outputs:
        - tool_results
      post_validations: []
      transitions:
        - to: dispatch_specialists
          when: always

    # ─── Step 6 ─────────────────────────────────────────────────
    - id: dispatch_specialists
      purpose: "Run all picked leaves in parallel as worker subagents; aggregate their findings."
      preconditions:
        - "picked_leaves is non-empty"
      worker:
        role: specialist-coordinator
        prompt_template: workers/specialist-coordinator.md
        inputs:
          - project_profile
          - changed_paths
          - picked_leaves
          - tool_results
        response_schema:
          type: object
          required: [specialist_outputs]
          properties:
            specialist_outputs:
              type: array
              items:
                type: object
                required: [id, status, findings]
                properties:
                  id: { type: string }
                  status: { enum: [completed, failed, skipped] }
                  runtime_ms: { type: integer }
                  tokens_in: { type: integer }
                  tokens_out: { type: integer }
                  findings:
                    type: array
                    items:
                      type: object
                      required: [severity, file, title]
                      properties:
                        severity: { enum: [critical, important, minor] }
                        file: { type: string }
                        line: { type: ["integer", "null"] }
                        title: { type: string }
                        description: { type: string }
                        impact: { type: string }
                        fix: { type: string }
                  skip_reason: { type: string }
                if:
                  properties:
                    status: { const: skipped }
                then:
                  required: [skip_reason]
      outputs:
        - specialist_outputs
      post_validations:
        - "specialist_outputs is an array"
      transitions:
        - to: collect_findings
          when: always

    # ─── Step 7 ─────────────────────────────────────────────────
    - id: collect_findings
      purpose: "Deduplicate findings across specialists; categorise by severity."
      preconditions:
        - "specialist_outputs exists in run state"
      # Inline state: deterministic dedup by (file, line, normalised_title).
      outputs:
        - findings
        - severity_counts
      post_validations:
        - "findings is an array"
      transitions:
        - to: verify_coverage
          when: always

    # ─── Step 8 ─────────────────────────────────────────────────
    - id: verify_coverage
      purpose: "Build the per-file coverage matrix; flag files reviewed by < 2 specialists."
      preconditions:
        - "findings exists in run state"
        - "picked_leaves exists in run state"
        - "changed_paths exists in run state"
      # Inline state: deterministic matrix build.
      outputs:
        - coverage_matrix
        - coverage_gaps
        - coverage_rule_violated
      post_validations:
        - "coverage_matrix is an array"
      transitions:
        - to: synthesize_release_readiness
          when: always

    # ─── Step 9 ─────────────────────────────────────────────────
    - id: synthesize_release_readiness
      purpose: "Aggregate findings into 8 gates by dimension/tag predicate; compute verdict."
      preconditions:
        - "findings exists in run state"
        - "picked_leaves exists in run state"
      # Inline state: deterministic predicate matching across the 8 gates
      # described in release-readiness.md.
      outputs:
        - gates
        - verdict
      post_validations:
        - "verdict is one of {GO, CONDITIONAL, NO-GO}"
        - "gates has exactly 8 entries"
      transitions:
        - to: write_run_directory
          when: always

    # ─── Step 10 ────────────────────────────────────────────────
    - id: write_run_directory
      purpose: "Write the persistent run directory: manifest.json + report.md + report.json."
      preconditions:
        - "verdict exists in run state"
        - "gates exists in run state"
      # Inline state: writes are handled by the fsm-commit script
      # via fsm-storage helpers. No worker.
      outputs:
        - run_dir_path
      post_validations:
        - "run_dir_path is a string"
      transitions:
        - to: emit_stdout
          when: always

    # ─── Step 11 ────────────────────────────────────────────────
    - id: emit_stdout
      purpose: "Print the report (markdown / JSON / YAML per format arg) plus manifest pointer."
      preconditions:
        - "run_dir_path exists in run state"
      # Inline state: stdout side effect; no FSM-side outputs.
      outputs: []
      post_validations: []
      transitions:
        - to: terminal
          when: always

    # ─── Edge-case states ────────────────────────────────────────

    # Reached when risk_tier_triage detects trivial diff with no signal.
    # Skips the rest of the pipeline; emits empty findings + GO verdict.
    - id: short_circuit_exit
      purpose: "Trivial diff with no risk signal: emit empty findings, GO verdict; then route through write_run_directory."
      preconditions:
        - "tier == 'trivial'"
      outputs:
        - findings
        - severity_counts
        - coverage_matrix
        - coverage_gaps
        - gates
        - verdict
        - short_circuited
      post_validations:
        - "verdict == 'GO'"
        - "len(findings) == 0"
      transitions:
        - to: write_run_directory
          when: always

    # Reached when tree_descend produces 0 candidates on a non-trivial diff.
    # Emits a coverage-gap warning and proceeds to a CONDITIONAL verdict —
    # the FSM cannot say GO without ANY review on a non-trivial diff.
    - id: stage_a_empty
      purpose: "Non-trivial diff with empty Stage A candidates: log routing anomaly, emit CONDITIONAL; then route through write_run_directory."
      preconditions:
        - "stage_a_candidates is empty"
      outputs:
        - findings
        - severity_counts
        - coverage_matrix
        - coverage_gaps
        - gates
        - verdict
        - degraded_run
      post_validations:
        - "verdict == 'CONDITIONAL'"
        - "degraded_run == true"
      transitions:
        - to: write_run_directory
          when: always

    # Final state. The FSM Orchestrator returns to Main Session.
    # Faults (schema validation failures, worker errors) are handled by the
    # @ctxr/fsm `fsm-commit` script writing a fault trace + setting
    # manifest.status = 'faulted' + releasing the lock; no dedicated fault
    # state is needed at the FSM level.
    - id: terminal
      purpose: "End of FSM. The FSM Orchestrator's job is done."
      preconditions: []
      outputs: []
      post_validations: []
      transitions: []
